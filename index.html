<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ED Note Vault</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <div class="hero">
    <div>
      <h1>ED Note Vault</h1>
      <p>ED templates by system: History, Examination, MDM/DDx and Discharge notes.</p>
    </div>
    <button id="themeToggle" title="Toggle theme">☀️</button>
  </div>
  <div class="search-wrap">
    <input id="search" type="search" placeholder="Search templates..." />
    <button id="clearSearch">Clear</button>
  </div>
  <div id="categoryGrid"></div>
</header>
<main>
  <section class="notice">
    <strong>Use safely:</strong> Copy, paste, then edit every note to match the actual patient, your real exam, investigations, local policy and specialist advice.
  </section>
  <div id="summary"></div>
  <section id="results"></section>
</main>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
